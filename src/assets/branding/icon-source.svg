<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Brand icon — square, designed for iOS apple-touch-icon (180x180) and
    favicon (32x32). iOS auto-rounds the corners. Matches the Nav.astro
    brand mark: olive-deep circle with a bold serif "A".
  -->
  <defs>
    <radialGradient id="bgGlow" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#5A7B3F" />
      <stop offset="60%" stop-color="#4A5D3A" />
      <stop offset="100%" stop-color="#36462A" />
    </radialGradient>
    <radialGradient id="sunGlow" cx="78%" cy="22%" r="40%">
      <stop offset="0%" stop-color="#F4A300" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#F4A300" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="charGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF5E9" />
      <stop offset="100%" stop-color="#E8D9B5" />
    </linearGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" seed="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.95  0 0 0 0 0.85  0 0 0 0 0.65  0 0 0 0.18 0"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGlow)" />
  <rect width="512" height="512" fill="url(#sunGlow)" />
  <rect width="512" height="512" filter="url(#grain)" opacity="0.45" />

  <!-- Subtle inner shadow for depth -->
  <rect x="0" y="0" width="512" height="512" fill="none" stroke="#000" stroke-width="2" opacity="0.18" />

  <!--
    Big italic serif "A" — Georgia 800 weight italic. Renders cleanly via
    rsvg in Linux build environments. Centered with optical adjustment
    (italic A leans right, so we shift left ~12px).
  -->
  <text
    x="256"
    y="354"
    text-anchor="middle"
    font-family="Georgia, 'Iowan Old Style', serif"
    font-style="italic"
    font-weight="800"
    font-size="320"
    fill="url(#charGrad)"
    letter-spacing="-8"
  >A</text>

  <!--
    Small marigold dot above the "A" — the "growing" accent, also reads as
    an italic dot that ties the mark to the family-business heritage.
  -->
  <circle cx="256" cy="92" r="9" fill="#F4A300" opacity="0.95" />

  <!--
    "EST. 1982" small line at the bottom — barely visible at 32px,
    a nice detail at 180px and 512px.
  -->
  <text
    x="256"
    y="450"
    text-anchor="middle"
    font-family="Helvetica, Arial, sans-serif"
    font-weight="600"
    font-size="22"
    fill="#F4A300"
    fill-opacity="0.85"
    letter-spacing="6"
  >EST 1982</text>
</svg>
